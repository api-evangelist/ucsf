    summary: >-
      UCSF has a genuinely public, documented, and live open-data API: the UCSF
      Profiles JSON API (api.profiles.ucsf.edu/json/v2/), which returned real JSON
      researcher data when probed with a source parameter. Its docs at
      profilesdeveloper.ucsf.edu resolved 200. UCSF also runs an institutional
      Developer@UCSF portal on MuleSoft Anypoint (SIS, building metadata, ServiceNow,
      CV APIs), but these are gated behind MyAccess SSO and the campus network and
      are not publicly consumable; developer.ucsf.edu and integrationservices.ucsf.edu
      did not resolve from the review network (status 0) though they are publicly
      indexed and confirmed via search. No endpoints were fabricated; only the
      Profiles API base URL and example call were verified live.
